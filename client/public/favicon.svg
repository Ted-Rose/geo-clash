<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#0f172a"/>

  <!-- Four territory quadrants -->
  <rect x="48" y="48" width="196" height="196" rx="20" fill="#2563eb"/>
  <rect x="268" y="48" width="196" height="196" rx="20" fill="#dc2626"/>
  <rect x="48" y="268" width="196" height="196" rx="20" fill="#dc2626" opacity="0.65"/>
  <rect x="268" y="268" width="196" height="196" rx="20" fill="#2563eb" opacity="0.65"/>

  <!-- Centre battle badge -->
  <circle cx="256" cy="256" r="78" fill="#0f172a"/>
  <circle cx="256" cy="256" r="68" fill="#f59e0b"/>

  <!-- Crossed swords (two diagonal lines) -->
  <line x1="222" y1="222" x2="290" y2="290" stroke="#0f172a" stroke-width="16" stroke-linecap="round"/>
  <line x1="290" y1="222" x2="222" y2="290" stroke="#0f172a" stroke-width="16" stroke-linecap="round"/>
</svg>
